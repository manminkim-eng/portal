/* ═══ 파티클 ═══ */
function Particles(){
  const ps=Array.from({length:8},(_,i)=>({id:i,left:`${Math.random()*100}%`,size:Math.random()*5+2,dur:Math.random()*14+8,del:Math.random()*8,col:["rgba(239,68,68,.3)","rgba(251,146,60,.22)","rgba(250,204,21,.18)"][i%3]}));
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>{ps.map(p=><div key={p.id} className="particle" style={{left:p.left,width:p.size,height:p.size,background:p.col,animationDuration:`${p.dur}s`,animationDelay:`${p.del}s`}}/>)}</div>;
}

<!-- ══════════════════════════════════════════════
     네비게이션 + iframe 제어 스크립트
══════════════════════════════════════════════ -->
<script>
/* ═══ 확정 URL (React와 동일하게 유지) ═══ */
const BASE_URL = "https://manminkim-eng.github.io";
const CALC_MAP = {
  indoor   : BASE_URL + "/fire-hydrant-calc/",
  outdoor  : BASE_URL + "/outdoor-hydrant-calc/",
  sprinkler: BASE_URL + "/fire-sprinkler-calc/",
  simple   : BASE_URL + "/simple-sprinkler-calc/",
  combo1   : BASE_URL + "/combo-pump-calc/",
  combo2   : BASE_URL + "/combo-easy-fire-calc/",
  combo3   : BASE_URL + "/combo-indoor-outdoor-calc/",
};

let _activeBtn = null;

/* React에서 호출하는 열기 함수 */
window._portalOpenCalc = function(key) {
  openCalc(key, document.getElementById('btn-' + key));
};

function openCalc(key, btn) {
  const url = CALC_MAP[key];
  if (!url) return;

  const frame  = document.getElementById('calc-frame');
  const home   = document.getElementById('home-screen');
  const loader = document.getElementById('loader');

  /* 로딩 표시 */
  home.style.display  = 'none';
  frame.style.display = 'none';
  loader.classList.add('show');

  /* iframe 로드 */
  frame.onload = () => {
    loader.classList.remove('show');
    frame.style.display = 'block';
  };
  frame.src = url;

  /* 버튼 활성화 */
  if (_activeBtn) _activeBtn.classList.remove('active');
  if (btn) { btn.classList.add('active'); _activeBtn = btn; }

  /* URL 히스토리 */
  history.pushState({ key }, '', '?app=' + key);
}

function goHome() {
  const frame  = document.getElementById('calc-frame');
  const home   = document.getElementById('home-screen');
  const loader = document.getElementById('loader');

  loader.classList.remove('show');
  frame.style.display = 'none';
  frame.src = '';
  home.style.display  = 'block';

  if (_activeBtn) _activeBtn.classList.remove('active');
  _activeBtn = null;

  history.pushState({}, '', location.pathname);
}

/* 네비게이션 버튼 이벤트 */
document.getElementById('btn-home').addEventListener('click', goHome);
['indoor','outdoor','sprinkler','simple','combo1','combo2','combo3'].forEach(key => {
  const btn = document.getElementById('btn-' + key);
  if (btn) btn.addEventListener('click', () => openCalc(key, btn));
});

/* 뒤로가기 */
window.addEventListener('popstate', e => {
  if (e.state && e.state.key) {
    openCalc(e.state.key, document.getElementById('btn-' + e.state.key));
  } else {
    goHome();
  }
});

/* URL 파라미터 직접 진입 */
const initKey = new URLSearchParams(location.search).get('app');
if (initKey && CALC_MAP[initKey]) {
  openCalc(initKey, document.getElementById('btn-' + initKey));
}

/* ═══ PWA — Service Worker ═══ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[SW] 등록 완료:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              _showUpdateToast();
            }
          });
        });
      })
      .catch(e => console.warn('[SW] 등록 실패:', e));
  });
}

/* ═══ PWA — 설치 배너 ═══ */
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  if (!window.matchMedia('(display-mode: standalone)').matches) {
    document.getElementById('pwa-banner').classList.add('show');
  }
});

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-banner').classList.remove('show');
  _deferredPrompt = null;
  console.log('[PWA] 설치 완료');
});

document.getElementById('pwa-inst-btn').addEventListener('click', async () => {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  document.getElementById('pwa-banner').classList.remove('show');
});

document.getElementById('pwa-close-btn').addEventListener('click', () => {
  document.getElementById('pwa-banner').classList.remove('show');
});

/* 업데이트 토스트 */
function _showUpdateToast() {
  const t = document.createElement('div');
  t.className = 'upd-toast';
  t.innerHTML =
    '<span>🔄 새 버전이 있습니다</span>' +
    '<button onclick="location.reload()" style="background:#C88214;color:#fff;border:none;' +
    'border-radius:7px;padding:5px 13px;font-size:11px;font-weight:800;cursor:pointer;' +
    'font-family:Pretendard,sans-serif;">업데이트</button>' +
    '<button onclick="this.parentElement.remove()" style="background:none;border:none;' +
    'color:rgba(255,255,255,.35);font-size:16px;cursor:pointer;line-height:1;">✕</button>';
  document.body.appendChild(t);
}
</script>

</body>
